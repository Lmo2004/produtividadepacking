<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ranking de Produtividade — BRRJ02</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial,sans-serif;background:#ebebeb;color:#333;min-height:100vh;padding:10px}
.page{max-width:480px;margin:0 auto;border-radius:14px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.12)}

/* ── HEADER ML ── */
.ml-header{background:#FFE600;padding:0 14px;display:flex;align-items:center;justify-content:space-between;height:50px;gap:10px}
.ml-logo-wrap{display:flex;align-items:center}
.ml-logo-img{height:30px;width:auto;object-fit:contain}
.ml-header-right{display:flex;align-items:center;gap:8px}
.ml-pill{background:rgba(0,0,0,.07);border:1.5px solid rgba(0,0,0,.14);border-radius:20px;padding:4px 10px;font-size:10px;font-weight:700;color:#333;white-space:nowrap}

/* ── BREADCRUMB ── */
.ml-bc{background:#fff;padding:5px 14px;font-size:10px;color:#666;border-bottom:1px solid #e0e0e0}
.ml-bc a{color:#3483FA;text-decoration:none}

/* ── PAGE TITLE ── */
.ml-page-title{background:#fff;padding:8px 14px;border-bottom:1px solid #f0f0f0}
.ml-page-title h1{font-size:14px;font-weight:700;color:#333}
.ml-page-title p{font-size:10px;color:#999;margin-top:2px}

/* ── TABS ── */
.ml-tabs{background:#fff;display:flex;border-bottom:1px solid #e0e0e0;padding:0 10px;overflow-x:auto;scrollbar-width:none}
.ml-tab{padding:8px 12px;font-size:12px;font-weight:500;color:#666;cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap;background:none;border-top:none;border-left:none;border-right:none;font-family:Arial,sans-serif;transition:color .15s}
.ml-tab.active{color:#3483FA;border-bottom:3px solid #3483FA;font-weight:700}
.ml-tab:hover:not(.active){color:#3483FA}

/* ── PANELS ── */
.ml-panel{display:none;background:#ebebeb;padding:8px}
.ml-panel.active{display:block}

/* ── SUMMARY ── */
.ml-summary{background:#fff;border-radius:6px;padding:10px 12px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.ml-summary h2{font-size:12px;font-weight:700;color:#333;margin-bottom:2px}
.ml-summary p{font-size:10px;color:#999}
.ml-badges{display:flex;gap:8px}
.ml-badge{text-align:center;background:#f5f5f5;border-radius:5px;padding:5px 10px;min-width:48px}
.ml-badge-val{font-size:14px;font-weight:700;color:#3483FA;line-height:1}
.ml-badge-lbl{font-size:8px;color:#999;text-transform:uppercase;letter-spacing:.04em;margin-top:2px}

/* ── CHART ── */
.ml-chart-card{background:#fff;border-radius:6px;padding:12px 14px;margin-bottom:8px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.ml-chart-title{font-size:12px;font-weight:700;color:#333;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.ml-chart-title::before{content:'';display:inline-block;width:3px;height:14px;background:#3483FA;border-radius:2px}
.ml-chart-wrap{display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.ml-chart-legend{display:flex;flex-direction:column;gap:7px}
.ml-leg-item{display:flex;align-items:center;gap:6px;font-size:11px;color:#555}
.ml-leg-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.ml-leg-pct{font-weight:700;color:#333;margin-left:8px}

/* ── SEARCH BOX ── */
.ml-search-wrap{background:#fff;border-radius:6px;padding:8px 14px;margin-bottom:8px;display:flex;align-items:center;gap:8px;box-shadow:0 1px 3px rgba(0,0,0,.08);border:1px solid #e0e0e0}
.ml-search-wrap span{font-size:14px;color:#999;flex-shrink:0}
.ml-search-wrap input{flex:1;border:none;outline:none;font-size:13px;color:#333;font-family:Arial,sans-serif}
.ml-search-wrap input::placeholder{color:#bbb}
.ml-no-results{text-align:center;padding:16px;font-size:12px;color:#999;display:none;background:#fff}

/* ── META BAR ── */
.ml-meta-bar{background:#EBF3FF;border:1px solid #C8DEFF;border-radius:5px;padding:6px 12px;margin-bottom:8px;font-size:10px;color:#1259C3;display:flex;flex-wrap:wrap;gap:8px}
.ml-mi{display:flex;align-items:center;gap:4px}
.ml-md{width:6px;height:6px;border-radius:50%;flex-shrink:0}

/* ── TABLE ── */
.ml-table-card{background:#fff;border-radius:6px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.08)}
table{width:100%;border-collapse:collapse}
thead th{background:#3483FA;color:#fff;font-size:9px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;padding:8px 5px;text-align:center}
thead th.nl{text-align:left;padding-left:10px}
tbody tr{animation:ri .25s ease both;transition:background .1s}
@keyframes ri{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
tbody tr:nth-child(even){background:#fafafa}
tbody tr:hover{background:#EBF3FF}
tbody td{padding:8px 5px;text-align:center;border-bottom:1px solid #f0f0f0;vertical-align:middle;font-size:11px}
tbody td.nl{text-align:left;padding-left:10px}
.rc{display:flex;align-items:center}
.rb{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;flex-shrink:0}
.rank-1{background:linear-gradient(135deg,#ffd700,#ffb300);color:#7a4a00;box-shadow:0 2px 5px rgba(255,179,0,.4)}
.rank-2{background:linear-gradient(135deg,#e8e8e8,#c0c0c0);color:#555}
.rank-3{background:linear-gradient(135deg,#ffb87a,#cd7f32);color:#fff}
.rank-n{background:#f0f0f0;color:#999;font-size:11px;font-weight:600}
.nc{display:flex;flex-direction:column;gap:1px}
.nm{font-size:11px;font-weight:700;color:#333}
.np{font-size:8px;color:#999}
.dv{font-size:9px;color:#999}
.pill{display:inline-flex;align-items:center;justify-content:center;min-width:44px;padding:3px 6px;border-radius:3px;font-size:11px;font-weight:700}
.pg{background:#00A650;color:#fff}
.py{background:#FFF3CD;color:#856404;border:1px solid #FFE066}
.pr{background:#FFE5E5;color:#C62828;border:1px solid #FFBBBB}
.uv{font-size:11px;font-weight:700;color:#333}

/* ── FOOTER ── */
.ml-footer{background:#fff;border-top:1px solid #e0e0e0;padding:12px 16px;text-align:center;font-size:10px;color:#999;margin-top:8px;border-radius:0 0 6px 6px}


  .page{max-width:480px;margin:0 auto;border-radius:14px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.12)}
  .ml-header{padding:0 12px;height:48px}
  .ml-logo-img{height:30px}
  .ml-pill{padding:4px 10px;font-size:10px}

  .ml-page-title h1{font-size:15px}
  .ml-tabs{padding:0 8px}
  .ml-tab{padding:8px 12px;font-size:12px}
  .ml-panel{padding:8px}
  .ml-summary{padding:10px 12px}
  .ml-summary h2{font-size:13px}
  .ml-badges{gap:6px}
  .ml-badge{padding:5px 8px;min-width:46px}
  .ml-badge-val{font-size:14px}
  .ml-badge-lbl{font-size:8px}
  .ml-chart-card{padding:10px 12px}
  .ml-chart-wrap{gap:10px}
  .ml-chart-legend{gap:5px}
  .ml-leg-item{font-size:10px}
  .ml-leg-pct{font-size:10px;margin-left:4px}
  .ml-meta-bar{padding:5px 10px;gap:6px;font-size:9px}
  .ml-search-wrap{padding:7px 12px}
  .ml-search-wrap input{font-size:12px}
  thead th{font-size:8px;padding:8px 5px;letter-spacing:.03em}
  thead th.nl{padding-left:10px}
  tbody td{padding:7px 5px;font-size:11px}
  tbody td.nl{padding-left:10px}
  .rb{width:22px;height:22px;font-size:10px}
  .nm{font-size:11px}
  .np{font-size:8px}
  .dv{font-size:9px}

}
</style>

function drawPie(id,g,y,r){
  const c=document.getElementById(id);
  if(!c)return;
  const ctx=c.getContext('2d');
  const total=g+y+r;
  if(!total)return;
  const sl=[{v:g,col:'#00A650'},{v:y,col:'#FFC107'},{v:r,col:'#E53935'}];
  let s=-Math.PI/2;
  ctx.clearRect(0,0,120,120);
  sl.forEach(sl=>{
    if(!sl.v)return;
    const a=(sl.v/total)*2*Math.PI;
    ctx.beginPath();ctx.moveTo(60,60);ctx.arc(60,60,52,s,s+a);ctx.closePath();

  ctx.fillText(Math.round((g/total)*100)+'%',60,60);
}

  const pY=total?Math.round((mu/total)*100):0;
  const pR=total?Math.round((mr/total)*100):0;

  const cards=rows.map((r,i)=>{
    const rc=i<3?['rank-1','rank-2','rank-3'][i]:'rank-n';
    return `<tr>
      <td><div class="rc"><div class="rb ${rc}">${i<3?MED[i]:i+1}</div></div></td>
      <td class="nl"><div class="nc"><span class="nm">${r.groot}</span><span class="np">${i+1}º lugar</span></div></td>
      <td class="dv">${DATE}</td>
      <td><span class="pill p${r.lc}">${r.liq}</span></td>
      <td><span class="pill p${r.uc}">${r.util}%</span></td>
      <td class="uv">${n(r.uni)}</td>
    </tr>`;
  }).join('');

  document.getElementById(key).innerHTML=`
    <div class="ml-summary">
      <div><h2>Produtividade — ${cfg.name}</h2><p>Meta: ${cfg.meta} unid/h · ${DATE}</p></div>
      <div class="ml-badges">
        <div class="ml-badge"><div class="ml-badge-val">${total}</div><div class="ml-badge-lbl">Reps</div></div>
        <div class="ml-badge"><div class="ml-badge-val">${cfg.meta}</div><div class="ml-badge-lbl">Meta</div></div>
        <div class="ml-badge"><div class="ml-badge-val">${n(total_uni)}</div><div class="ml-badge-lbl">Unid.</div></div>
      </div>
    </div>
    <div class="ml-chart-card">
      <div class="ml-chart-title">Atingimento da Meta — Prod. Líquida</div>
      <div class="ml-chart-wrap">
        <canvas id="pie_${key}" width="120" height="120"></canvas>
        <div class="ml-chart-legend">
          <div class="ml-leg-item"><div class="ml-leg-dot" style="background:#00A650"></div>Acima ≥${cfg.meta} &nbsp;<span class="ml-leg-pct">${ml} rep${ml!==1?'s':''} · ${pG}%</span></div>
          <div class="ml-leg-item"><div class="ml-leg-dot" style="background:#FFC107"></div>Atenção ${cfg.low}–${cfg.meta-1} &nbsp;<span class="ml-leg-pct">${mu} rep${mu!==1?'s':''} · ${pY}%</span></div>
          <div class="ml-leg-item"><div class="ml-leg-dot" style="background:#E53935"></div>Abaixo ≤${cfg.low-1} &nbsp;<span class="ml-leg-pct">${mr} rep${mr!==1?'s':''} · ${pR}%</span></div>
        </div>
      </div>
    </div>
    <div class="ml-meta-bar">
      <div class="ml-mi"><div class="ml-md" style="background:#00A650"></div>Prod ≥${cfg.meta} verde</div>
      <div class="ml-mi"><div class="ml-md" style="background:#FFC107"></div>${cfg.low}–${cfg.meta-1} amarelo</div>
      <div class="ml-mi"><div class="ml-md" style="background:#E53935"></div>≤${cfg.low-1} vermelho</div>
      <div class="ml-mi"><div class="ml-md" style="background:#00A650"></div>Util ≥85% verde</div>
      <div class="ml-mi"><div class="ml-md" style="background:#FFC107"></div>80–84% amarelo</div>
      <div class="ml-mi"><div class="ml-md" style="background:#E53935"></div>≤79% vermelho</div>
    </div>
    <div class="ml-search-wrap">
      <span>🔍</span>
      <input type="text" placeholder="Pesquisar por ID Groot..." oninput="filterTable(this,'${key}')"/>
    </div>
    <div class="ml-table-card">
      <table>
        <thead><tr>
          <th style="width:36px">#</th><th class="nl">ID Groot</th>
          <th style="width:76px">Data</th><th style="width:80px">Prod. Líq.</th>
          <th style="width:74px">Utiliz.</th><th style="width:66px">Unid.</th>
        </tr></thead>
        <tbody id="tbody_${key}">${cards}</tbody>
      </table>
      <div class="ml-no-results" id="no_${key}">Nenhum resultado encontrado.</div>
    </div>
    <div class="ml-footer">Gerado em ${DATE} · BRRJ02 Fulfilment · 1º Turno</div>`;

  setTimeout(()=>drawPie('pie_'+key,ml,mu,mr),50);
}

function show(id,btn){
  document.querySelectorAll('.ml-tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.ml-panel').forEach(p=>p.classList.remove('active'));
  if(btn)btn.classList.add('active');
  document.getElementById(id).classList.add('active');
  setTimeout(()=>{const d=D[id];drawPie('pie_'+id,d.ml,d.mu,d.total-d.ml-d.mu);},60);
}

['Mono','Putwall','WallIn','Machine'].forEach(buildPanel);
setTimeout(()=>{const d=D.Mono;drawPie('pie_Mono',d.ml,d.mu,d.total-d.ml-d.mu);},120);
</script>
</body>
</html>
