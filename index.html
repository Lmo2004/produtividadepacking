<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Ranking de Produtividade – 02/05/2026</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--ml-yellow:#FFE600;--ml-yellow-dark:#E6CF00;--ml-blue:#3483FA;--ml-text:#333333;--ml-text2:#666666;--ml-text3:#999999;--ml-bg:#F5F5F5;--ml-white:#FFFFFF;--ml-border:#E0E0E0;--ml-border2:#CCCCCC;--green:#00A650;--green-bg:#E6F7EE;--green-bord:#99DDB8;--yellow-badge:#E37A00;--yellow-badge-bg:#FFF3E0;--yellow-badge-bord:#FFCC80;--red:#E53935;--red-bg:#FFEBEE;--red-bord:#FFAAA8;--pie-g:#00A650;--pie-y:#E37A00;--pie-r:#E53935;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased}
html,body{font-family:'Inter',sans-serif;background:var(--ml-bg);color:var(--ml-text);min-height:100vh;font-size:14px}
.hdr{background:var(--ml-yellow);height:54px;padding:0 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:300;box-shadow:0 2px 8px rgba(0,0,0,0.12)}
.hdr-l{display:flex;align-items:center;gap:10px}
.hdr-divider{width:1px;height:22px;background:rgba(0,0,0,0.15)}
.hdr-title{font-size:.82rem;font-weight:700;color:var(--ml-text)}
.hdr-sub{font-size:.62rem;color:rgba(0,0,0,0.55);margin-top:1px}
.hdr-r{text-align:right}
.hdr-turno{font-size:.72rem;font-weight:700;color:var(--ml-text)}
.hdr-date{font-size:.62rem;color:rgba(0,0,0,0.55)}
.tabs{background:var(--ml-white);border-bottom:1px solid var(--ml-border);position:sticky;top:54px;z-index:200;display:flex;overflow-x:auto;scrollbar-width:none;padding:0 14px;box-shadow:0 1px 4px rgba(0,0,0,0.06)}
.tabs::-webkit-scrollbar{display:none}
.tab{flex:0 0 auto;padding:12px 16px 11px;border:none;background:transparent;cursor:pointer;font-family:'Inter',sans-serif;font-weight:600;font-size:.78rem;color:var(--ml-text3);border-bottom:3px solid transparent;transition:color .15s,border-color .15s;white-space:nowrap}
.tab.active{color:var(--ml-blue);border-bottom-color:var(--ml-blue);font-weight:700}
.pane{display:none}.pane.active{display:block}
.hero{background:var(--ml-yellow);padding:16px 16px 14px;border-bottom:1px solid var(--ml-yellow-dark)}
.hero-eyebrow{font-size:.6rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:rgba(0,0,0,0.5);margin-bottom:4px}
.hero-title{font-size:1.2rem;font-weight:900;color:var(--ml-text);line-height:1.1;letter-spacing:-.4px}
.hero-title em{color:var(--ml-blue);font-style:normal}
.hero-meta{font-size:.65rem;color:rgba(0,0,0,0.5);margin-top:3px;font-weight:500}
.hero-pills{display:flex;gap:8px;margin-top:12px}
.pill{flex:1;background:rgba(255,255,255,0.65);border:1px solid rgba(0,0,0,0.08);border-radius:10px;padding:8px;text-align:center}
.pill-n{font-size:1rem;font-weight:900;color:var(--ml-text);line-height:1;letter-spacing:-.5px}
.pill-l{font-size:.52rem;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:rgba(0,0,0,0.45);margin-top:2px}
.lz{background:var(--ml-bg)}
.obs{padding:12px 14px;background:var(--ml-bg);border-bottom:1px solid var(--ml-border);display:grid;grid-template-columns:1fr 1fr;gap:8px}
.obs-card{background:var(--ml-white);border:1px solid var(--ml-border);border-radius:10px;padding:10px 12px;box-shadow:0 1px 4px rgba(0,0,0,0.06)}
.obs-ttl{font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--ml-text3);margin-bottom:7px}
.obs-body{display:flex;align-items:center;gap:10px}
.obs-stats{flex:1;display:flex;flex-direction:column;gap:4px}
.obs-row{display:flex;align-items:center;gap:5px;font-size:.65rem}
.obs-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.obs-lbl{color:var(--ml-text2);flex:1}
.obs-val{font-weight:700;font-size:.8rem}
.vg{color:var(--green)}.vy{color:var(--yellow-badge)}.vr{color:var(--red)}
.legend{background:var(--ml-white);padding:7px 14px;border-bottom:1px solid var(--ml-border);display:flex;flex-wrap:wrap;gap:6px 10px;align-items:center}
.leg{display:flex;align-items:center;gap:4px;font-size:.6rem;color:var(--ml-text2);font-weight:500}
.ldot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.lg2{background:var(--pie-g)}.ly2{background:var(--pie-y)}.lr2{background:var(--pie-r)}
.lsep{width:1px;height:9px;background:var(--ml-border2)}
.tbl-wrap{overflow-x:auto;background:var(--ml-white)}
table{width:100%;border-collapse:collapse}
thead tr{background:#FAFAFA;border-bottom:2px solid var(--ml-border)}
th{padding:9px 11px;text-align:left;font-size:.6rem;text-transform:uppercase;letter-spacing:.9px;color:var(--ml-text3);font-weight:700;white-space:nowrap}
th.c{text-align:center}th.r{text-align:right}
td{padding:0;border-bottom:1px solid var(--ml-border)}
tbody tr:last-child td{border-bottom:none}
tbody tr:active{background:#F0F4FF}
.ci{padding:10px 11px;display:flex;align-items:center}
.cc{justify-content:center}.cr{justify-content:flex-end}
.rk{display:flex;flex-direction:column;align-items:center;width:36px;gap:1px}
.rk-c{width:27px;height:27px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.75rem;background:#F0F0F0;color:var(--ml-text2);border:1.5px solid var(--ml-border2)}
.rk-p{font-size:.5rem;color:var(--ml-text3);white-space:nowrap;font-weight:500}
.med{font-size:1.1rem;line-height:1}
.gid{font-size:.85rem;font-weight:700;color:var(--ml-text)}
.dv{font-size:.65rem;color:var(--ml-text3);font-weight:500}
.bdg{display:inline-flex;align-items:center;justify-content:center;min-width:46px;padding:4px 8px;border-radius:6px;font-weight:800;font-size:.88rem}
.bg{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bord)}
.by{background:var(--yellow-badge-bg);color:var(--yellow-badge);border:1px solid var(--yellow-badge-bord)}
.br{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bord)}
.uv{font-size:.88rem;font-weight:700;color:var(--ml-text2)}
</style>
</head>

function pie(id,g,y,r){
  const c=document.getElementById(id);if(!c)return;
  const x=c.getContext('2d'),t=g+y+r,cx=c.width/2,cy=c.height/2,rad=cx-2;
  if(!t)return;

    +'<span class="leg">Util: ≥85% · 80–84% · &lt;80%</span>'
    +'</div>'
    +'<div class="tbl-wrap"><table>'
    +'<thead><tr><th class="c">#</th><th>ID Groot</th><th>Data</th><th class="c">Prod. Líq.</th><th class="c">Util.</th><th class="r">Unid.</th></tr></thead>'
    +'<tbody>'+rows+'</tbody>'
    +'</table></div></div>';
}
function show(tid,btn){
  document.querySelectorAll('.tab').forEach(function(b){b.classList.remove('active')});
  document.querySelectorAll('.pane').forEach(function(p){p.classList.remove('active')});
  btn.classList.add('active');
  document.getElementById(tid).classList.add('active');
}
['Mono','Putwall','WallIn','Machine'].forEach(build);
</script>
